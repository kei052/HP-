<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断アンケート</title>

<style>
body{
    margin:0;
    font-family:"Yu Gothic",sans-serif;
    background:#f5f5f5;
}

header{
    background:#4A90E2;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    padding:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{margin-top:0;}

label{
    display:block;
    margin:10px 0;
}

input[type="checkbox"]{
    margin-right:10px;
}

.submit-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4A90E2;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.back-btn{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#999;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>

<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0077ff">
<link rel="apple-touch-icon" href="./icons/icon-192.png">

</head>

<body>

<header>
    <h1>今学期の診断アンケート</h1>
</header>

<div class="container">

<div class="card">
<h2>表示する時期</h2>
<label><input type="checkbox" class="period" value="1年前期">1年前期</label>
<label><input type="checkbox" class="period" value="1年後期">1年後期</label>
<label><input type="checkbox" class="period" value="2年前期">2年前期</label>
<label><input type="checkbox" class="period" value="2年後期">2年後期</label>
<label><input type="checkbox" class="period" value="3年前期">3年前期</label>
<label><input type="checkbox" class="period" value="3年後期">3年後期</label>
<label><input type="checkbox" class="period" value="4年前期">4年前期</label>
<label><input type="checkbox" class="period" value="4年後期">4年後期</label>
</div>

<div class="card">
<h2>取得済み講義</h2>
<div id="subjectArea"></div>
</div>

<div class="card">
<h2>興味のある職種</h2>
<div id="jobArea"></div>

<label>
<input type="checkbox" id="undecided" onchange="toggleUndecided()">
特に決まっていない
</label>
</div>

<button class="submit-btn" onclick="startDiagnosis()">診断開始</button>
<button class="back-btn" onclick="location.href='index.html'">ホームへ戻る</button>

</div>

<script>
const subjects = [
"情報処理論","システム統計論","プログラミング応用","プログラミング応用演習",
"アルゴリズム論","データベース演習","データ処理入門","情報化社会論",
"インターネットと法","ネットワーク技術Ⅰ","ネットワーク技術Ⅱ",
"ネットワークの構築と運用","システム開発技術（IoT）","ウェブデザイン",
"ウェブコンテンツ実践","情報と職業","経営情報論","産業情報論",
"情報セキュリティ","健康情報統計Ⅱ","健康情報統計Ⅲ","健康情報数学Ⅱ",
"健康情報数学Ⅲ","社会調査法","AIデータサイエンスⅠ","AIデータサイエンスⅡ",
"医療・生命情報学Ⅰ","医療・生命情報学Ⅱ","パターン認識","画像認識",
"自然言語処理","人工知能","臨床医学および医療用語","臨床医学各論Ⅰ",
"臨床医学各論Ⅱ","臨床医学各論Ⅲ","臨床医学各論Ⅳ","診療情報管理論Ⅰ",
"診療情報管理論Ⅱ","医療管理各論","国際統計分類I","国際統計分類Ⅱ",
"健康ビッグデータ","デジタルヘルスコミュニケーション",
"デジタルヘルステクノロジー","デジタルヘルスイノベーション","医療統計学",
"社会心理学","観光行動論","マーケティング論","地域マーケティング論",
"市場調査論","簿記原理","会計学原理","経営分析論","経営戦略論","経営統計学"
];

const jobs = [
"診療情報管理士","教職","プログラマ","システムエンジニア","Webデザイン",
"データサイエンティスト","AI開発者","ネットワーク管理者",
"セキュリティアナリスト","ITコンサルタント","ITサポート・ヘルプデスク"
];

window.onload = function(){
    renderCheckboxes();
    restoreAnswers();
};

function renderCheckboxes(){
    document.getElementById("subjectArea").innerHTML = subjects.map(s => `
        <label><input type="checkbox" class="subject" value="${s}">${s}</label>
    `).join("");

    document.getElementById("jobArea").innerHTML = jobs.map(j => `
        <label><input type="checkbox" class="job" value="${j}">${j}</label>
    `).join("");
}

function toggleUndecided(){
    const undecided = document.getElementById("undecided");
    const jobs = document.querySelectorAll(".job");

    jobs.forEach(job => {
        job.disabled = undecided.checked;
        if(undecided.checked) job.checked = false;
    });
}

function restoreAnswers(){
    const editIndex = localStorage.getItem("editHistoryIndex");
    const history = JSON.parse(localStorage.getItem("history")) || [];

    let savedSubjects = JSON.parse(localStorage.getItem("selectedLectures")) || [];
    let savedJobs = JSON.parse(localStorage.getItem("selectedJobs")) || [];
    let savedPeriods = JSON.parse(localStorage.getItem("selectedPeriods")) || [];
    let undecided = localStorage.getItem("undecided") === "true";

    if(editIndex !== null && history[Number(editIndex)]){
        const item = history[Number(editIndex)];
        savedSubjects = item.subjects || [];
        savedJobs = item.selectedJobs || [];
        savedPeriods = item.periods || [];
        undecided = item.undecided || false;
    }

    document.querySelectorAll(".subject").forEach(s => {
        if(savedSubjects.includes(s.value)) s.checked = true;
    });

    document.querySelectorAll(".job").forEach(j => {
        if(savedJobs.includes(j.value)) j.checked = true;
    });

    document.querySelectorAll(".period").forEach(p => {
        if(savedPeriods.includes(p.value)) p.checked = true;
    });

    document.getElementById("undecided").checked = undecided;
    toggleUndecided();
}

function startDiagnosis(){
    const selectedSubjects = [];
    const selectedJobs = [];
    const selectedPeriods = [];

    document.querySelectorAll(".subject:checked").forEach(s => selectedSubjects.push(s.value));
    document.querySelectorAll(".job:checked").forEach(j => selectedJobs.push(j.value));
    document.querySelectorAll(".period:checked").forEach(p => selectedPeriods.push(p.value));

    const undecided = document.getElementById("undecided").checked;

    localStorage.setItem("selectedLectures", JSON.stringify(selectedSubjects));
    localStorage.setItem("selectedJobs", JSON.stringify(selectedJobs));
    localStorage.setItem("selectedPeriods", JSON.stringify(selectedPeriods));
    localStorage.setItem("undecided", undecided ? "true" : "false");

    const history = JSON.parse(localStorage.getItem("history")) || [];
    const editIndex = localStorage.getItem("editHistoryIndex");

    const item = {
        date: new Date().toLocaleString(),
        subjects: selectedSubjects,
        selectedJobs: selectedJobs,
        periods: selectedPeriods,
        ranking: [],
        rankingByTab: {},
        undecided: undecided
    };

    if(editIndex !== null && history[Number(editIndex)]){
        history[Number(editIndex)] = item;
        localStorage.removeItem("editHistoryIndex");
    }else{
        history.push(item);
    }

    localStorage.setItem("history", JSON.stringify(history));

    alert("診断完了！");
    location.href = "index.html";
}
</script>


<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
        navigator.serviceWorker.register("./service-worker.js")
            .catch(function (error) {
                console.error("Service Worker registration failed:", error);
            });
    });
}
</script>

</body>
</html>
