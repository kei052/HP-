<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断履歴</title>

<style>
body{
    margin:0;
    font-family:"Yu Gothic",sans-serif;
    background:#f5f5f5;
}

header{
    background:#0077ff;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    padding:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.small{
    color:#666;
    font-size:14px;
    margin-top:5px;
    line-height:1.7;
}

.btn{
    width:100%;
    padding:14px;
    margin-bottom:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

.detailBtn{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#4A90E2;
    color:white;
    cursor:pointer;
}

.detailBox{
    display:none;
    background:#f6f9ff;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
}

.blue{ background:#4A90E2; color:white; }
.red{ background:#e74c3c; color:white; }
.green{ background:#2ecc71; color:white; }
</style>
</head>

<body>

<header>
    <h1>診断履歴</h1>
</header>

<div class="container">

<button class="btn blue" onclick="location.href='index.html'">ホームへ戻る</button>
<button class="btn green" onclick="location.href='anke-to.html'">診断を開く</button>
<button class="btn red" onclick="clearHistory()">履歴をすべて削除</button>

<div class="card">
    <div class="title">最新の診断結果</div>
    <div id="latest"></div>
</div>

<div id="historyArea"></div>

</div>

<script>
let history = JSON.parse(localStorage.getItem("history")) || [];
let latest = JSON.parse(localStorage.getItem("latestRanking")) || [];

function renderLatest(){
    const area = document.getElementById("latest");

    if(!latest || latest.length === 0){
        area.innerHTML = `<div class="small">該当なし</div>`;
        return;
    }

    area.innerHTML = latest.slice(0,5).map((item,i)=>`
        <div class="small">${i + 1}位：${item.name}（適合率 ${item.rate}%）</div>
    `).join("");
}

function renderHistory(){
    const area = document.getElementById("historyArea");
    area.innerHTML = "";

    if(history.length === 0){
        area.innerHTML = `
            <div class="card">
                <div class="title">まだ履歴がありません</div>
                <div class="small">診断を実行するとここに表示されます</div>
            </div>
        `;
        return;
    }

    const reversed = [...history].reverse();

    reversed.forEach((item, index) => {
        const originalIndex = history.length - 1 - index;
        const ranking = item.ranking || [];

        area.innerHTML += `
            <div class="card">
                <div class="title">診断 ${history.length - index}</div>

                <div class="small">日時：${item.date}</div>
                <div class="small">選択職種：${(item.selectedJobs || []).join("、") || "なし"}</div>
                <div class="small">選択講義数：${(item.subjects || []).length}</div>
                <div class="small">取得済み講義：${(item.subjects || []).join("、") || "なし"}</div>

                <button id="historyBtn${originalIndex}" class="detailBtn" onclick="toggleHistoryDetail(${originalIndex})">
                    詳細を見る
                </button>

                <div id="historyDetail${originalIndex}" class="detailBox">
                    ${
                        ranking.length === 0
                        ? `<div class="small">ランキング詳細はまだありません。ホーム画面を一度開くと反映されます。</div>`
                        : ranking.map((r,i)=>`
                            <div class="small">
                                ${i + 1}位：${r.name}（適合率 ${r.rate}%）
                            </div>
                        `).join("")
                    }
                </div>
            </div>
        `;
    });
}

function toggleHistoryDetail(index){
    const box = document.getElementById("historyDetail" + index);
    const btn = document.getElementById("historyBtn" + index);

    if(box.style.display === "block"){
        box.style.display = "none";
        btn.textContent = "詳細を見る";
    }else{
        box.style.display = "block";
        btn.textContent = "閉じる";
    }
}

function clearHistory(){
    if(!confirm("本当に履歴をすべて削除しますか？")) return;

    localStorage.removeItem("history");
    localStorage.removeItem("latestRanking");
    localStorage.removeItem("selectedLectures");
    localStorage.removeItem("selectedJobs");
    localStorage.removeItem("undecided");
    localStorage.removeItem("lectureCandidates");

    history = [];
    latest = [];

    renderLatest();
    renderHistory();

    alert("履歴を削除しました");
}

renderLatest();
renderHistory();
</script>

</body>
</html>
